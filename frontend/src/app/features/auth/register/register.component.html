<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Enter your details to get started.</p>

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label for="reg-username" class="field-label">Username</label>
        <input
          id="reg-username"
          type="text"
          name="username"
          class="field-input"
          placeholder="Choose a username"
          autocomplete="username"
          [(ngModel)]="username"
          required
        />
      </div>

      <div class="field">
        <label for="reg-email" class="field-label">Email Address</label>
        <input
          id="reg-email"
          type="email"
          name="email"
          class="field-input"
          placeholder="Enter your email"
          autocomplete="email"
          [(ngModel)]="email"
          required
        />
      </div>

      <div class="field">
        <label for="reg-password" class="field-label">Password</label>
        <div class="field-input-wrap">
          <input
            id="reg-password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            class="field-input"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            [(ngModel)]="password"
            required
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'" tabindex="-1">
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="auth-error" role="alert">{{ error() }}</div>
      }

      <button type="submit" class="auth-submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
        }
        {{ loading() ? 'Creating account...' : 'Sign Up' }}
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" class="auth-google" (click)="loginWithGoogle()">
      <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.88 2.68-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.32z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.96l3.01 2.32C4.68 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login" class="auth-link">Sign In</a>
    </p>
  </div>
</div>
