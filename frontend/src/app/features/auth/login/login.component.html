<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Please enter your details to sign in.</p>

    @if (sessionExpired()) {
      <div class="auth-banner" role="status">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Your session expired. Please sign in to continue.
      </div>
    }

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label for="login-email" class="field-label">Email Address</label>
        <input
          id="login-email"
          type="email"
          name="email"
          class="field-input"
          placeholder="Enter your email"
          autocomplete="email"
          [(ngModel)]="email"
          required
        />
      </div>

      <div class="field">
        <label for="login-password" class="field-label">Password</label>
        <div class="field-input-wrap">
          <input
            id="login-password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            class="field-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            [(ngModel)]="password"
            required
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'" tabindex="-1">
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="auth-error" role="alert">{{ error() }}</div>
      }

      <button type="submit" class="auth-submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
        }
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register" class="auth-link">Sign Up</a>
    </p>
  </div>
</div>
