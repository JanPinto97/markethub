@if (popup.isOpen()) {
  <div class="popup-shell" role="dialog" aria-label="Warren assistant">
    <header class="popup-header">
      <div class="popup-title">
        <span class="popup-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/>
          </svg>
        </span>
        <span class="popup-name">Warren</span>
      </div>
      <button type="button" class="popup-close" (click)="close()" aria-label="Close assistant">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="popup-body">
      <app-chat-core
        [sessionId]="sessionId()"
        [initialMessage]="initialMessage()"
        [attachedContext]="attachedContext()"
        [showWelcome]="false"
        [showSuggestions]="false"
        [showHint]="false"
        placeholder="Ask Warren about this release…"
      ></app-chat-core>
    </div>
  </div>
}
