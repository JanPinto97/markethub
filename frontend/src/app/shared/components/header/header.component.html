<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a routerLink="/" class="header-logo" aria-label="MarketHub home">
        <img src="assets/images/full_logo.png" alt="MarketHub" />
      </a>

      <span class="brand-divider" aria-hidden="true"></span>

      <nav class="header-nav">
        <a routerLink="/community" routerLinkActive="active" class="nav-tab">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Community</span>
        </a>
        <a routerLink="/markets" routerLinkActive="active" class="nav-tab">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
          <span>Markets</span>
        </a>
        <span class="nav-tab nav-tab-disabled" aria-disabled="true">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/>
            <path d="M19 14l.7 1.7 1.7.7-1.7.7-.7 1.7-.7-1.7-1.7-.7 1.7-.7z"/>
            <path d="M5 3l.5 1.2L6.7 4.7 5.5 5.2 5 6.4 4.5 5.2 3.3 4.7 4.5 4.2z"/>
          </svg>
          <span>IA</span>
        </span>
      </nav>
    </div>

    <div class="header-right">
      <span class="markets-pill" [class.is-closed]="!marketsOpen()">
        <span class="markets-dot" aria-hidden="true"></span>
        Mercats oberts
      </span>

      <button type="button" class="header-icon-btn notif-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        @if (hasUnreadNotifications()) {
          <span class="notif-dot" aria-hidden="true"></span>
        }
      </button>

      <a routerLink="/settings" class="header-icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>

      @if (auth.isAuthenticated()) {
        <div class="avatar-wrap">
          <button type="button" class="avatar-btn" (click)="toggleMenu($event)" [attr.aria-expanded]="menuOpen()" aria-haspopup="menu" aria-label="Open user menu">
            @if (auth.currentUser()?.avatar) {
              <img [src]="auth.currentUser()!.avatar | mediaUrl" alt="" />
            } @else {
              <span class="avatar-initials" [style.background-color]="getUsernameColor(auth.currentUser()?.username || '')">
                {{ initials(auth.currentUser()?.username) }}
              </span>
            }
          </button>

          @if (menuOpen()) {
            <div class="avatar-menu" role="menu">
              <div class="avatar-menu-header">
                <div class="avatar-menu-name">{{ auth.currentUser()?.username }}</div>
                @if (auth.currentUser()?.email) {
                  <div class="avatar-menu-email">{{ auth.currentUser()?.email }}</div>
                }
              </div>
              <button type="button" class="avatar-menu-item" role="menuitem" (click)="goToProfile()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                My profile
              </button>
              <div class="avatar-menu-sep" role="separator"></div>
              <button type="button" class="avatar-menu-item avatar-menu-item-danger" role="menuitem" (click)="logout()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
              </button>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/login" class="btn-login">Login</a>
        <a routerLink="/register" class="btn-signup">Sign Up</a>
      }
    </div>
  </div>
</header>
