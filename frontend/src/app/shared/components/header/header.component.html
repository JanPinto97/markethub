<header class="app-header">
  <div class="header-inner">
    <div class="header-row header-row-primary">
      <div class="header-left">
        <a routerLink="/" class="header-logo" aria-label="MarketHub home">
          <img src="assets/images/full_logo.png" alt="MarketHub" />
        </a>
        <nav class="header-nav header-nav-desktop">
          <a routerLink="/community" routerLinkActive="active" class="nav-link">Community</a>
          <a routerLink="/markets" routerLinkActive="active" class="nav-link">Markets</a>
          <span class="nav-link nav-link-disabled" aria-disabled="true">IA</span>
        </nav>
      </div>

      <div class="header-right">
        @if (auth.isAuthenticated()) {
          <a routerLink="/settings" class="header-icon-btn" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </a>
          <a [routerLink]="'/profile/' + (auth.currentUser()?.username || '')" class="header-avatar" aria-label="My profile">
            @if (auth.currentUser()?.avatar) {
              <img [src]="auth.currentUser()!.avatar | mediaUrl" alt="" />
            } @else {
              <span class="avatar-initial" [style.background-color]="getUsernameColor(auth.currentUser()?.username || '')">
                {{ getInitial(auth.currentUser()?.username || '') }}
              </span>
            }
          </a>
        } @else {
          <a routerLink="/login" class="btn-login">Login</a>
          <a routerLink="/register" class="btn-signup">Sign Up</a>
        }
      </div>
    </div>

    <nav class="header-nav header-nav-mobile">
      <a routerLink="/community" routerLinkActive="active" class="nav-link">Community</a>
      <a routerLink="/markets" routerLinkActive="active" class="nav-link">Markets</a>
      <span class="nav-link nav-link-disabled" aria-disabled="true">IA</span>
    </nav>
  </div>
</header>
